<div id="menuOverlay" class="absolute inset-0 flex items-start justify-center bg-black/60 z-10 pt-24"
  style="background-image: url('../assets/pong.jpg'); background-size: cover; background-repeat: no-repeat;">

  <div class="flex gap-8 ml-[24rem]">
    <button id="localBtn" class="w-40 h-40 bg-orange-500 text-black font-extrabold text-lg font-comic
      rounded-xl border-2 border-black/40 shadow-lg
      hover:bg-orange-600
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      <span data-i18n="PONG_LOCAL">Local<br>Game</span>
    </button>

    <button id="AIBtn" class="w-40 h-40 bg-orange-500 text-black font-extrabold text-lg font-comic
      rounded-xl border-2 border-black/40 shadow-lg
      hover:bg-orange-600
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      <span data-i18n="PONG_AI">AI Opponent<br>Game</span>
    </button>

    <button id="tournamentBtn" class="w-40 h-40 bg-orange-500 text-black font-extrabold text-lg font-comic
      rounded-xl border-2 border-black/40 shadow-lg
      hover:bg-orange-600
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      <span data-i18n="PONG_TOURNAMENT">Tournament</span>
    </button>

    <button id="onlineBtn" class="w-40 h-40 bg-orange-500 text-black font-extrabold text-lg font-comic
      rounded-xl border-2 border-black/40 shadow-lg
      hover:bg-orange-600
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      <span data-i18n="PONG_ONLINE">Online<br>Game</span>
    </button>
  </div>

  <div id="pong-achievements" class="absolute top-4 left-4 bg-black/70 text-white rounded-xl p-4 max-w-xs text-sm">
    <div class="font-bold mb-2">🏆 My Achievements</div>
    <ul id="pong-achievements-list" class="list-disc pl-4 space-y-1">
      <li class="text-gray-400">Loading...</li>
    </ul>
  </div>

  <div class="absolute bottom-8 left-1/2 -translate-x-1/2 bg-black/75 text-white rounded-xl p-4 w-[36rem] text-sm z-20">
    <div class="font-bold mb-2 text-center">🏆 Latest 10 Achievements</div>
    <table class="w-full border-collapse">
      <thead>
        <tr class="text-orange-400 text-xs uppercase">
          <th class="text-left pb-1 pr-3">Player</th>
          <th class="text-left pb-1 pr-3">Achievement</th>
          <th class="text-left pb-1">Earned</th>
        </tr>
      </thead>
      <tbody id="pong-results-table">
        <tr><td colspan="3" class="text-gray-400 pt-1">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>
