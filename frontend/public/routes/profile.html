<div  class="min-h-screen flex justify-center items-center bg-zinc-900 flex-col">
    <div class="p-6 bg-zinc-800 rounded-lg w-full max-w-2xl">
        <div id="profile-avatar" 
            class="w-20 h-20 rounded-full bg-zinc-700 flex items-center justify-center text-4xl text-zinc-400 font-bold mx-auto mb-1">
            ?
       </div>
       <p id="profile-username" class="text-white text-xl font-semibold text-center mb-6">Username</p>
       
       <div class="bg-zinc-700 rounded-lg p-4 flex justify-around">
           <div class="text-center">
               <p class="text-zinc-400 text-sm">Wins</p>
               <p id="profile-wins" class="text-white text-2xl font-bold">0</p>
           </div>
            <div class="text-center">
               <p class="text-zinc-400 text-sm">Losses</p>
               <p id="profile-losses" class="text-white text-2xl font-bold">0</p>
           </div>
                <div class="text-center">
               <p class="text-zinc-400 text-sm">ELO</p>
               <p id="profile-elo" class="text-white text-2xl font-bold">0</p>
           </div>
       </div>
            <div class="bg-zinc-700 rounded-lg p-4">
                <p class="text-white font-semibold mb-3">Add friends</p>
                <div class="flex gap-2">
                    <input id="friend-input" type="text" placeholder="Username"
                        class="flex-1 p-2 rounded bg-zinc-600 text-white focus:outline-none focus:ring-2 focus:ring-violet-500">
                    <p id="friend-status" class="text-sm mt-2"></p>
                    <button id="friend-add-btn"
                        class="px-4 py-2 rounded bg-violet-500 text-zinc-900 font-semibold hover:bg-violet-400 transition transform hover:scale-105">
                        Add
                    </button>
                </div>
            </div>

            <div id="profile-pending-requests"></div>
            
            <div id="profile-friends-list"></div>

            <button id="profile-logout" 
            class="text-zinc-400 font-bold w-full transition transform hover:scale-105 hover:text-white pt-6">
            Logout
            </button>
    </div>
</div>
