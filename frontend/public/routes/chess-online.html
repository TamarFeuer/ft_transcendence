<div class="absolute inset-0 flex items-center justify-center bg-gray-950">

  <!--board and status-->
  <div class="flex flex-col items-center gap-3">
    <div class="text-gray-500 text-xs tracking-widest uppercase">Online Chess</div>

    <!--line under the title about whose turn-->
    <div id="game-status" class="text-white text-sm font-semibold tracking-wide h-5">
      Connecting...
    </div>

    <div id="chess-board" class="rounded-sm overflow-hidden shadow-2xl shadow-black/60"></div>
  </div>

  <!--same promotion row as the local chess page-->
  <div id="promotion-picker" class="hidden absolute inset-0 flex items-center justify-center bg-black/60 z-10">
    <div class="bg-gray-800 rounded-xl p-4 flex gap-4 text-5xl">
      <span data-piece="q" class="cursor-pointer hover:scale-125 transition-transform">♕</span>
      <span data-piece="r" class="cursor-pointer hover:scale-125 transition-transform">♖</span>
      <span data-piece="b" class="cursor-pointer hover:scale-125 transition-transform">♗</span>
      <span data-piece="n" class="cursor-pointer hover:scale-125 transition-transform">♘</span>
    </div>
  </div>

  <!--blocks the board until the other player arrives-->
  <div id="waiting-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-gray-950/90 z-20">
    <div class="text-white text-xl font-semibold mb-3">Waiting for opponent...</div>
    <div class="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
  </div>

</div>
