<div id="menuOverlay" class="absolute inset-0 flex flex-col items-center justify-start bg-black/20 z-10 pt-12"
  style="background-image: url('../assets/background.jpg'); background-size: cover; background-repeat: no-repeat;">
  <div class="mt-0 flex gap-10 w-full max-w-xl px-4">
    <button id="tttBtn" class="flex-1 py-10 bg-blue-600 text-slate-200 font-extrabold text-xl rounded-lg font-comic
      border-2 border-yellow-400 shadow-[0_0_10px_yellow]
      hover:bg-blue-700 hover:border-pink-400
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      <span data-i18n="BTN_TIC_TAC_TOE">Tic-Tac-Toe</span>
    </button>
    <button id="chessBtn" class="flex-1 py-10 bg-blue-600 text-slate-200 font-extrabold text-xl rounded-lg font-comic
      border-2 border-yellow-400 shadow-[0_0_10px_yellow]
      hover:bg-blue-700 hover:border-pink-400
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      Chess
    </button>
    <button id="pongBtn" class="flex-1 py-10 bg-blue-600 text-slate-200 font-extrabold text-xl rounded-lg font-comic
      border-2 border-yellow-400 shadow-[0_0_10px_yellow]
      hover:bg-blue-700 hover:border-pink-400
      transition-transform transition-colors duration-150
      active:scale-95 active:shadow-inner">
      <span data-i18n="BTN_PONG">Pong</span>
    </button>
    <button id="profileBtn" class="absolute top-4 right-4 z-20 px-4 py-2 bg-zinc-800 text-white font-semibold rounded-lg hover:bg-zinc-700 transition">
      Profile
    </button>

    <!-- Leaderboard Table (Dynamic) -->
    <div id="leaderboardTableContainer" class="absolute top-20 left-4 z-10 bg-white bg-opacity-90 rounded-lg shadow-lg p-4 w-80 border border-zinc-300">
      <h2 class="text-xl font-bold mb-2 text-zinc-800">Leaderboard</h2>
      <table class="min-w-full text-sm text-left">
        <thead>
          <tr>
            <th class="py-1 px-2 border-b">Rank</th>
            <th class="py-1 px-2 border-b">Player</th>
            <th class="py-1 px-2 border-b">Score</th>
          </tr>
        </thead>
        <tbody id="leaderboardTableBody">
          <tr><td colspan="3" class="py-2 px-2 text-center text-zinc-500">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
  </div>
</div>
