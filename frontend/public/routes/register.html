<div class="min-h-screen flex justify-center items-center bg-zinc-900 flex-col">
  <div class="p-6 bg-zinc-800 rounded-lg w-80">
    <h1 class="text-white text-2xl font-semibold text-center mb-6">Register</h1>

    <form id="register-form" class="space-y-4">
      <input
        id="register-username"
        name="username"
        type="text"
        placeholder="Username"
        autocomplete="username"
        class="w-full p-2 rounded bg-zinc-700 text-white focus:outline-none focus:ring-2 focus:ring-violet-500"/>

      <input
        id="register-password"
        name="password"
        type="password"
        placeholder="Password"
        autocomplete="new-password"
        class="w-full p-2 rounded bg-zinc-700 text-white focus:outline-none focus:ring-2 focus:ring-violet-500"/>

      <button
        type="submit"
        class="w-full py-3 rounded bg-violet-500 text-zinc-900 font-semibold hover:bg-violet-400 transition transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-violet-400">
        Create account
      </button>

      <a id="register-back-login"
        href="login.html"
        class="block w-full text-center py-2 text-zinc-300 font-semibold hover:text-white transition transform hover:scale-105">
        Back to login
      </a>
    </form>
  </div>
</div>
