<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #renderCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #tictactoeCanvas, #minesweeperCanvas {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      border: 2px solid #333;
    }

    #menuOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 10;
    }

    #menuOverlay h1 {
      color: white;
      font-size: 48px;
      margin-bottom: 30px;
    }

    #menuOverlay button {
      background: #1e90ff;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 20px;
      border-radius: 8px;
      cursor: pointer;
    }

    #menuOverlay button:hover {
      background: #006ad1;
    }
    #playerCountContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }

    #playerCountContainer input {
      width: 60px;
      text-align: center;
      margin-top: 5px;
    }
    #playersTournamentRegistration {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }

    #playersTournamentRegistration input {
      width: 60px;
      text-align: center;
      margin-top: 5px;
    }

    #setPlayerAliasContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 10px;
    }
    #setPlayerAliasContainer input {
      width: 150px;
      text-align: center;
      margin-top: 5px;
    }

    .gameReturnBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: #1e90ff;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 100;
      display: none;
    }

    .gameReturnBtn:hover {
      background: #006ad1;
    }

    #languageSelector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 8px;
    }

    #languageSelector select {
      background: #1e90ff;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    #languageSelector select:hover {
      background: #006ad1;
    }
  </style>
</head>

<body>

<!-- Language selector -->
<div id="languageSelector">
  <label data-i18n="LABEL_LANGUAGE">Language:</label>
  <select id="languageSelect">
    <option value="en">English</option>
    <option value="es">Español</option>
    <option value="fr">Français</option>
    <option value="tr">Türkçe</option>
    <option value="nl">Nederlands</option>
  </select>
</div>

<!-- Fullscreen game container -->
<div class="container">

	<!-- Return buttons for games -->
	<button id="tictactoeReturnBtn" class="gameReturnBtn">← Return</button>
	<button id="minesweeperReturnBtn" class="gameReturnBtn">← Return</button>
	<button id="pongReturnBtn" class="gameReturnBtn">← Return</button>

	<!-- Babylon canvas -->
	<canvas id="renderCanvas"></canvas>

	<!-- Minesweeper canvas -->
	<canvas id="minesweeperCanvas" style="display:none;"></canvas>

	<!-- Tic-Tac-Toe canvas -->
	<canvas id="tictactoeCanvas" style="display:none;"></canvas>

	<!-- Menu overlay -->
	<div id="menuOverlay">
		<h1 data-i18n="MAIN_TITLE">Pong</h1>
		<!-- Step 1: Game Selection -->
		<div id="GameSelection">
			<button id="tttBtn" data-i18n="BTN_TIC_TAC_TOE">Tic-Tac-Toe</button>
			<button id="mineBtn" data-i18n="BTN_MINESWEEPER">Minesweeper</button>
      <button id="pongBtn" data-i18n="BTN_PONG">Pong</button>
		</div>
    <!-- Step 2: Local or Online -->
		<div id="LocalOrOnlineSelection" style="display:none;">
			<button id="localBtn" data-i18n="BTN_LOCAL">LOCAL</button>
			<button id="onlineBtn" data-i18n="BTN_ONLINE">ONLINE</button>
		</div>
		<!-- Step 3: Mode selection -->
		<div id="localOptions" style="display:none;">
			<button id="singlePlayerBtn" data-i18n="BTN_SINGLEPLAYER">SINGLEPLAYER</button>
			<button id="localMultiBtn" data-i18n="BTN_MULTIPLAYER">MULTIPLAYER</button>
			<button id="localTournamentBtn" data-i18n="BTN_TOURNAMENT">TOURNAMENT</button>
		</div>
		<div id="onlineOptions" style="display:none;">
			<button id="onlineMultiBtn" data-i18n="BTN_MULTIPLAYER">MULTIPLAYER</button>
			<button id="onlineTournamentBtn" data-i18n="BTN_TOURNAMENT">TOURNAMENT</button>
		</div>
		<!-- Step 4: Player count (for local multiplayer/tournament) -->
		<div id="playerCountContainer" style="display:none;">
			<label for="playerCount" data-i18n="LABEL_PLAYER_COUNT">Enter number of players:</label>
			<input type="number" id="playerCount" min="2" value="2">
			<button id="startGameBtn" data-i18n="BTN_START_GAME">START GAME</button>
		</div>
		<div id="playersTournamentRegistration" style="display:none;">
			<label for="playerCount" data-i18n="LABEL_PLAYER_COUNT">Enter number of players:</label>
			<input type="number" id="TournamentPlayerCount" min="2">
			<button id="registerPlayersBtn" data-i18n="BTN_REGISTER_PLAYERS">REGISTER PLAYERS</button>
		</div>
    <div id="setPlayerAliasContainer" style="display: none;">
      <label for="playerAlias" data-i18n="LABEL_PLAYER_ALIAS">Enter your alias:</label>
      <input type="text" id="playerAlias" maxlength="20" />
      <button id="setAliasBtn" data-i18n="BTN_SET_ALIAS">SET ALIAS</button>
    </div>
	</div>
	<div id="scoreHud" class="hidden" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: white; font-size: 24px;">
	<span id="player1Score">0</span> - <span id="player2Score">0</span>

  </div>

  <!-- Your JS -->
  <script type="module" src="src/main.ts"></script>

</body>
</html>
